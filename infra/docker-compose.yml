services:
  postgres:
    image: postgres:16-alpine
    container_name: tribu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tribu
      POSTGRES_USER: tribu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - tribu_pg_data:/var/lib/postgresql/data

  redis:
    image: valkey/valkey:8-alpine
    container_name: tribu-redis
    restart: unless-stopped

  backend:
    image: ghcr.io/itsdnns/tribu-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tribu-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://tribu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/tribu
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      # For external storage (e.g. NAS), replace with a bind mount:
      # - /mnt/nas/backups/tribu:/backups
      - tribu_backups:/backups

  frontend:
    image: ghcr.io/itsdnns/tribu-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tribu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  tribu_pg_data:
  tribu_backups:
